  background-repeat:repeat,no-repeat;
  background-size:160px 160px,auto;
  background-position:top left,center;
  color:var(--text);
  font-family:'Nunito', 'MyanmarText','Padauk', system-ui, sans-serif;
  font-size:18px;

  min-height:100vh;
}
.wrap{max-width:880px;margin:0 auto;padding:0 18px;}
h1,h2,h3,h4,.fredoka{font-family:'Fredoka', 'MyanmarUI','Padauk', 'Nunito', sans-serif;}

.btn{
  font-family:'Fredoka', 'MyanmarUI','Padauk', sans-serif;
  font-weight:600;
  font-size:20px;
  letter-spacing:0.02em;
  color:#3A2A07;
  background:var(--gold);
  border:none;
  border-radius:999px;
  padding:13px 32px;
  cursor:pointer;
  box-shadow:0 4px 0 var(--gold-deep);
  transition:transform 0.1s ease, box-shadow 0.1s ease, filter 0.15s ease;
}
.btn:hover{filter:brightness(1.06);}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--gold-deep);}
.btn.ghost{
  background:transparent;color:var(--gold);
  box-shadow:none;border:2px solid var(--gold);padding:11px 30px;
}
.btn.ghost:hover{background:rgba(244,182,63,0.12);}
.btn:focus-visible, a:focus-visible{outline:3px solid var(--white);outline-offset:3px;}
a{color:var(--gold);font-weight:700;text-decoration:none;}
a:hover{text-decoration:underline;}

header{text-align:center;padding:24px 0 8px;position:relative;}
.langToggle{display:flex;justify-content:flex-end;gap:4px;margin:0 0 16px;}
.langToggle .grp{display:flex;gap:4px;background:rgba(10,42,46,0.55);padding:3px;border-radius:999px;border:1px solid rgba(244,182,63,0.3);}
.langBtn{
  font-family:'Fredoka','MyanmarUI','Padauk',sans-serif;font-weight:600;font-size:13px;
  color:var(--text-mute);background:transparent;border:none;cursor:pointer;
  padding:5px 12px;border-radius:999px;line-height:1.1;transition:all 0.2s ease;
}
.langBtn.on{background:var(--gold);color:var(--teal-deep);}
.langBtn:not(.on):hover{color:var(--white);}
.pill{
  display:inline-block;font-size:12px;font-weight:800;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--teal-deep);
  background:var(--gold);border-radius:999px;padding:6px 18px;margin-bottom:18px;
}
h1{font-size:clamp(34px,7vw,58px);font-weight:600;line-height:1.1;color:var(--white);}
h1 .accent{color:var(--gold);}
.tagline{font-size:20px;color:var(--text-mute);margin-top:12px;margin-bottom:30px;}

.table{
  background:var(--teal-panel);
  border:1px solid var(--teal-line);
  border-radius:28px;
  padding:28px 32px 34px;
  margin-bottom:30px;
}
.hud{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:22px;text-align:center;}
.pips{display:flex;gap:8px;}
.pips span{
  width:12px;height:12px;border-radius:50%;
  background:rgba(255,255,255,0.18);transition:background 0.3s ease, transform 0.3s ease;
}
.pips span.on{background:var(--gold);transform:scale(1.15);}
.statusText{font-size:19px;font-weight:700;color:var(--text);}

.f3{perspective:760px;}
.f3i{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transform:rotateY(180deg);
  transition:transform 0.55s cubic-bezier(.3,.7,.3,1);
}
.f3i.fl{transform:rotateY(0deg);}
.f3face{position:absolute;inset:0;backface-visibility:hidden;border-radius:inherit;}
.f3back{transform:rotateY(180deg);}
.mback{
  width:100%;height:100%;
  background-color:#0E565E;
  background-image:radial-gradient(circle at 7px 7px, #1B767E 4.5px, transparent 5.5px);
  background-size:14px 14px;
  border:3px solid var(--white);
  border-radius:12px;
  box-shadow:0 3px 8px rgba(4,22,25,0.35);
  display:flex;align-items:center;justify-content:center;
}
.mlogo{
  border-radius:50%;background:var(--gold);color:var(--teal-deep);
  font-family:'Fredoka',sans-serif;font-weight:600;
  display:flex;align-items:center;justify-content:center;
}

#fan{position:relative;width:100%;}
#fan.rows{display:flex;flex-direction:column;align-items:center;gap:5px;height:auto!important;}
#fan.rows .frow{display:flex;justify-content:center;gap:3px;width:100%;}
#fan.rows .frow.ovrow{justify-content:flex-start;gap:0;}
#fan.rows .fc{position:static;}
.fc{position:absolute;opacity:0;transform:translateY(44px) scale(0.8);transition:opacity 0.35s ease, transform 0.45s cubic-bezier(.2,.9,.3,1.25);}
.fc.in{opacity:1;transform:translateY(0) scale(1);}
.fc .rot{transition:transform 0.16s ease;}
@media (hover:hover) and (pointer:fine){
  .fc:hover .rot{transform:translateY(-12px) scale(1.08) rotate(var(--a)) !important;}
}
.centerBtn{text-align:center;margin-top:20px;}
#peekBtn{margin-top:22px;}
#peekBtn .btn{font-size:15px;padding:9px 22px;}

.card{
  background:var(--white);
  border-radius:12px;
  position:relative;
  box-shadow:0 3px 8px rgba(4,22,25,0.35);
  user-select:none;
}
.card .corner{
  position:absolute;top:6px;left:8px;
  font-weight:800;line-height:1;text-align:center;
  font-family:'Fredoka',sans-serif;
}

      howHTML:`<h2>၂၁ ဖဲချပ် လှည့်ကွက်</h2><p class="howSub">ဆော့ကစားနည်း အဆင့်ဆင့်</p><ol class="howSteps"><li><strong>အဆင့် ၁။ ဖဲချပ် ၂၁ ချပ်ကို ရွေးထုတ်ပါ</strong>ဖဲထုပ်ထဲကနေ ကြိုက်နှစ်သက်ရာ ဖဲချပ် ၂၁ ချပ်ကိုပဲ သီးသန့်ရွေးထုတ်ပြီး ရောမွှေလိုက်ပါ။ ကျန်တဲ့ဖဲချပ်တွေကို ဖယ်ထားပါ။</li><li><strong>အဆင့် ၂။ သူငယ်ချင်းကို ဖဲတစ်ချပ် မှတ်ခိုင်းပါ</strong>အဲဒီ ၂၁ ချပ်ကို သူငယ်ချင်းကို ပြပြီး စိတ်ထဲကနေ တစ်ချပ်ကိုပဲ သေသေချာချာ မှတ်ထားခိုင်းပါ (ထုတ်ပြောဖို့မလိုပါဘူး)။</li><li><strong>အဆင့် ၃။ ဖဲချပ်တွေကို ၃ ပုံ ဖြန့်ခင်းပါ</strong>ဖဲချပ်တွေကို တစ်ချပ်ချင်းစီ ဘယ်ကနေ ညာကို ၃ ပုံ (တစ်ပုံမှာ ၇ ချပ်စီ ရှိပါလိမ့်မယ်) မျက်နှာစာလှန်ပြီး ချသွားပါ။</li><li><strong>အဆင့် ၄။ ဘယ်အပုံထဲမှာ ပါလဲလို့ မေးပါ</strong>သူငယ်ချင်းကို “မင်းစိတ်ထဲမှတ်ထားတဲ့ ဖဲချပ်က ဘယ်ဖဲပုံထဲမှာပါလဲ” လို့ မေးပါ။ (သူက ဖဲပုံကိုပဲ ညွှန်ပြရမှာဖြစ်ပြီး ဘယ်ကတ်လဲဆိုတာ ပြောစရာမလိုပါဘူး)။</li><li><strong>အဆင့် ၅။ ဖဲပုံတွေကို ပြန်သိမ်းပါ (အဓိကအဆင့်)</strong>ဖဲပုံ ၃ ပုံကို ပြန်စုပြီး တစ်ပုံတည်းဖြစ်အောင် လုပ်ရပါမယ်။ ထူးခြားချက်က သူငယ်ချင်း ညွှန်ပြတဲ့ ဖဲပုံကို အမြဲတမ်း အလယ်မှာ ထားပြီး သိမ်းရပါမယ်။ (ဥပမာ - သူပြတဲ့အပုံကို ကျန်တဲ့ ၂ ပုံရဲ့ ကြားထဲမှာ ညှပ်ပြီး ကောက်သိမ်းလိုက်တာမျိုးပါ)။</li><li><strong>အဆင့် ၆။ အဆင့် ၃ ကနေ ၅ ကို နောက်ထပ် ၂ ကြိမ် ထပ်လုပ်ပါ</strong>အထက်ပါအတိုင်း ဖဲပြန်ဖြန့်မယ်၊ ဘယ်အပုံထဲပါလဲမေးမယ်၊ သူပြတဲ့အပုံကို အလယ်မှာထားပြီး ပြန်သိမ်းမယ်... ဆိုတဲ့အဆင့်ကို နောက်ထပ် ၂ ကြိမ် (စုစုပေါင်း ၃ ကြိမ် ပြည့်အောင်) လုပ်ပေးရပါမယ်။</li></ol><h3>မျက်လှည့်ရဲ့ နောက်ဆုံးရလဒ်</h3><p>အဆင့်အားလုံးကို စနစ်တကျ ၃ ကြိမ် လုပ်ပြီးသွားရင်တော့ သင့်လက်ထဲမှာ ဖဲ ၂၁ ချပ် ဖဲပုံကြီး တစ်ပုံ ပြန်ဖြစ်နေပါလိမ့်မယ်။ အဲဒီဖဲချပ်တွေကို အပေါ်ကနေ တစ်ချပ်ချင်းစီ ရေတွက်ပြီး လှန်ချသွားပါ။ ၁၁ ချပ်မြောက် ဖဲချပ် အလှန်မှာတော့ သင့်သူငယ်ချင်း စိတ်ထဲက မှတ်ထားတဲ့ ဖဲချပ် အတိအကျ ထွက်လာတာကို တွေ့ရပါလိမ့်မယ်။</p><p>ဒီလှည့်ကွက်ရဲ့ လျှို့ဝှက်ချက်က မျက်လှည့်အစွမ်းကြောင့် မဟုတ်ဘဲ သင်္ချာနည်းလမ်းကျကျ စီစဉ်မှု (Mathematical Elimination) ကြောင့် ဖြစ်ပါတယ်။ သင်္ချာနည်းအရ သူမှတ်ထားတဲ့ ကတ်က အမြဲတမ်း အလယ်ဗဟို (၁၁ ချပ်မြောက်နေရာ) ကို ရောက်သွားလို့ပဲ ဖြစ်ပါတယ်။</p><h3>မျက်လှည့်၏ သင်္ချာညီမျှခြင်း (Mathematical Equation)</h3><p>သူငယ်ချင်း မှတ်ထားသောကတ်၏ အစပိုင်းနေရာကို x ဟု သတ်မှတ်ပြီး ဖဲပုံကို အလယ်တွင် ညှပ်သိမ်းပြီးနောက် နောက်တစ်ကြိမ်တွင် ရောက်ရှိသွားမည့် နေရာသစ် x′ ကို အောက်ပါဖော်မြူလာဖြင့် တွက်ချက်နိုင်ပါသည်—</p><div class="formula"><span>x′ =</span><span class="floor">⌊</span><span class="frac"><span class="num">x + 14</span><span class="den">3</span></span><span class="floor">⌋</span></div><p class="howNote">(မှတ်ချက် - ⌊ … ⌋ သည် ဒသမကိန်းထွက်လာပါက အောက်ကိန်းပြည့်သို့ ဖြတ်ချသည့် Floor Function ဖြစ်ပါသည်)</p><h4>၃ ကြိမ်တိုင်တိုင် နေရာပြောင်းလဲသွားပုံ ဥပမာ (x = 1 ဖြစ်ခဲ့လျှင်)</h4><ul class="howEx"><li>၁ ကြိမ်မြောက် ပြန်သိမ်းပြီးနောက်နေရာ (x₁): x₁ = ⌊(1 + 14)/3⌋ = 5 (၅ ချပ်မြောက်နေရာသို့ ရောက်ရှိ)</li><li>၂ ကြိမ်မြောက် ပြန်သိမ်းပြီးနောက်နေရာ (x₂): x₂ = ⌊(5 + 14)/3⌋ = ⌊6.33⌋ = 6 (၆ ချပ်မြောက်နေရာသို့ ရောက်ရှိ)</li><li>၃ ကြိမ်မြောက် ပြန်သိမ်းပြီးနောက်နေရာ (x₃): x₃ = ⌊(6 + 14)/3⌋ = ⌊6.66⌋ = 6 (၆ ချပ်မြောက်နေရာတွင် ပိတ်မိသွား)</li></ul><p>အပုံငယ်၏ ၆ ချပ်မြောက်နေရာသို့ ရောက်ရှိသွားပြီး ၎င်းအပုံ၏အပေါ်တွင် နောက်ထပ် ဖဲ ၇ ချပ်ပါသော အပုံတစ်ပုံ တင်လိုက်သည့်အတွက် ဖဲအပုံကြီးတစ်ခုလုံးတွင် 7 + 6 = 13 ချပ်မြောက်နေရာ (Face-up စနစ်ဖြင့် ရေတွက်ပါက အောက်မှရေတွက်လျှင် ၁၁ ချပ်မြောက်နေရာ၊ တစ်နည်းအားဖြင့် ၂၁ ချပ်၏ အလယ်ဗဟိုအကျဆုံး နေရာ) သို့ သင်္ချာနည်းအရ မလွဲမသွေ ဆိုက်ဆိုက်မြိုက်မြိုက် ရောက်ရှိသွားခြင်း ဖြစ်ပါသည်။</p>`,

  function cardHTML(card,w,h,fs){
    var colorClass=isRed(card.s)?"cRed":"cBlk";
    var isFace=(card.r==="K"||card.r==="Q"||card.r==="J");
    var rad=Math.max(4,Math.round(w*0.11));
    var ins=Math.max(2,Math.round(w*0.085));
    var center=isFace?'':'<div class="ctr">'+suitSVG(card.s,Math.round(w*0.52))+'</div>';
    var faceImg=isFace
      ?'<img class="faceImg" src="'+FACE_IMG[card.r]+'" alt="" draggable="false" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);max-width:62%;max-height:60%;pointer-events:none;-webkit-user-drag:none;">'
      :'';
    return '<div class="card '+colorClass+'" style="width:'+w+'px;height:'+h+'px;border-radius:'+rad+'px;">'
      +'<div class="corner" style="font-size:'+fs+'px;top:'+ins+'px;left:'+ins+'px;">'+card.r+'<small style="display:block;line-height:0;margin-top:'+Math.max(1,Math.round(fs*0.08))+'px;">'+suitSVG(card.s,Math.round(fs*0.66))+'</small></div>'
      +center
      +faceImg
      +'<div class="pip" style="bottom:'+ins+'px;right:'+ins+'px;line-height:0;">'+suitSVG(card.s,Math.round(fs*0.78))+'</div>'
      +'</div>';
  }

  function backHTML(w){
    var rad=Math.max(4,Math.round(w*0.11));
    var bw=w<46?2:3;
    return '<div class="mback" style="border-radius:'+rad+'px;border-width:'+bw+'px;"></div>';
  }

  function flipCard(card,w,h,fs){
    return '<div class="f3" style="width:'+w+'px;height:'+h+'px;">'
      +'<div class="f3i'+(reduced?' fl':'')+'">'
      +'<div class="f3face">'+cardHTML(card,w,h,fs)+'</div>'
      +'<div class="f3face f3back">'+backHTML(w)+'</div>'
      +'</div></div>';
  }

  function setPips(n){
    var ps=document.querySelectorAll("#pips span");
    ps.forEach(function(el,i){ el.classList.toggle("on", i<n); });
  }

  function renderFan(){
    var fan=document.getElementById("fan");
    var W=Math.min(fan.clientWidth||820,840);
    var small=W<480;
    var html="";
    if(small){
      fan.classList.add("rows");
      fan.style.display="flex";
      fan.style.height="auto";
      var gap=5;
      var perRow=Math.max(3,Math.min(5,Math.floor((W+gap)/(64+gap))));
      var cw=Math.floor((W-(perRow-1)*gap)/perRow);
      cw=Math.max(40,Math.min(cw,86));
      var ch=Math.round(cw*1.4), fs=Math.max(11,Math.round(cw*0.26));
      var cols=7;
      var step=(W-cw)/(cols-1);
      var ov=step-cw;
      var rows=[[0,7],[7,14],[14,21]];
      for(var r=0;r<3;r++){
        html+='<div class="frow ovrow">';
        for(var ci=0,i=rows[r][0];i<rows[r][1];i++,ci++){
          var ml=ci===0?0:ov;
          html+='<div class="fc" style="--a:0deg;margin-left:'+ml.toFixed(1)+'px;z-index:'+ci+';">'
            +'<div class="rot">'+flipCard(cards[i],cw,ch,fs)+'</div></div>';
        }
        html+='</div>';
      }
      fan.innerHTML=html;
    } else {
      fan.classList.remove("rows");
      fan.style.display="block";
      var cw=76, ch=106, fs=17;
      var A=48*Math.PI/180;
      var R=(W-cw-8)/(2*Math.sin(A));
      for(var i=0;i<21;i++){
        var a=-A+(2*A)*i/20;
        var deg=(a*180/Math.PI).toFixed(1)+"deg";
        var x=W/2+R*Math.sin(a)-cw/2;
        var y=14+R*(1-Math.cos(a));
        html+='<div class="fc" style="left:'+x.toFixed(1)+'px;top:'+y.toFixed(1)+'px;">'
          +'<div class="rot" style="--a:'+deg+';transform:rotate('+deg+');">'+flipCard(cards[i],cw,ch,fs)+'</div></div>';
      }
      fan.style.height=(14+R*(1-Math.cos(A))+ch+34)+"px";
      fan.innerHTML=html;
    }
    var els=fan.querySelectorAll(".fc");
    var actBtn=peeking?"backBtn":"fanBtn";
    document.getElementById("fanBtn").style.display="none";
    document.getElementById("backBtn").style.display="none";
    if(reduced){
      els.forEach(function(el){el.classList.add("in");});
      document.getElementById(actBtn).style.display="block";
    }else{
      els.forEach(function(el,i){
        setTimeout(function(){el.classList.add("in");},55*i);
        setTimeout(function(){el.querySelector(".f3i").classList.add("fl");},55*i+240);
      });
      setTimeout(function(){document.getElementById(actBtn).style.display="block";},55*21+420);
    }
  }

  function deal(){
    var piles=[[],[],[]];
    cards.forEach(function(c,i){piles[i%3].push(c);});
    return piles;
  }

  function enableMagnify(stack,ch,offset){
    if(!canHover||reduced)return;
    var pcs=[].slice.call(stack.querySelectorAll(".pc"));
    var centers=pcs.map(function(el,i){return i*offset+ch/2;});
    stack.addEventListener("pointermove",function(e){
      if(stack.dataset.ready!=="1")return;
      var r=stack.getBoundingClientRect();
      var y=e.clientY-r.top;
      pcs.forEach(function(el,i){
        var d=Math.abs(y-centers[i]);
        var f=Math.max(0,1-d/130);
        var s=1+0.34*f*f;
        el.style.transform="scale("+s.toFixed(3)+")";
        el.style.zIndex=String(10+Math.round(f*100));
      });
    });
    stack.addEventListener("pointerleave",function(){
      pcs.forEach(function(el){el.style.transform="";el.style.zIndex="";});
    });
  }

  function renderPiles(dealAnchor){
    var piles=deal();
    var wrap=document.getElementById("piles");
    wrap.classList.remove("out");
    var avail=wrap.clientWidth;
    if(!avail||avail<40){var st=document.getElementById("stage");avail=st?st.clientWidth:820;}
    var gap=avail<520?8:16;
    var colW=(avail-2*gap)/3;
    var cw=Math.max(60,Math.min(88,Math.floor(colW-2)));
    var ch=Math.round(cw*1.386), fs=Math.max(13,Math.round(cw*0.205));
    var offset=Math.round(cw*0.4545);
    var stackH=ch+6*offset;
    var html="";
    for(var p=0;p<3;p++){
      html+='<div class="pile"><div class="pileStack" style="width:'+cw+'px;height:'+stackH+'px;">';
      var ord=[0,1,2,3,4,5,6];
      for(var s=ord.length-1;s>0;s--){var j=Math.floor(Math.random()*(s+1));var tmp=ord[s];ord[s]=ord[j];ord[j]=tmp;}
      for(var i=0;i<7;i++){
        html+='<div class="pc" data-order="'+(i*3+p)+'" style="top:'+(i*offset)+'px;">'+flipCard(piles[p][ord[i]],cw,ch,fs)+'</div>';
      }
      html+='</div><button class="btn" onclick="pick('+p+')">'+t("here")+'</button></div>';
    }
    wrap.innerHTML=html;
    wrap.style.display="grid";
    var stacks=wrap.querySelectorAll(".pileStack");
    var pcs=wrap.querySelectorAll(".pc");

    if(dealAnchor && !reduced){
      // start every card stacked at the deck anchor, face-down
      pcs.forEach(function(el){
        var o=parseInt(el.getAttribute("data-order"),10);
        var r=el.getBoundingClientRect();
        var cx=r.left+r.width/2, cy=r.top+r.height/2;
        var dx=dealAnchor.x-cx, dy=dealAnchor.y-cy;
        el.style.opacity="1";
        el.style.transition="none";
        el.style.transform="translate("+dx.toFixed(1)+"px,"+dy.toFixed(1)+"px)";
        el.style.zIndex=String(100-o);
        el.querySelector(".f3i").classList.remove("fl");
      });
      void wrap.offsetWidth; // force layout so the start transform applies
      var maxT=0, dealStep=62, flyDur=430;
      pcs.forEach(function(el){
        var o=parseInt(el.getAttribute("data-order"),10);
        var delay=300+o*dealStep;
        if(delay+flyDur>maxT)maxT=delay+flyDur;
        setTimeout(function(){
          el.style.transition="transform "+flyDur+"ms cubic-bezier(.22,.7,.25,1)";
          el.style.transform="translate(0,0)";
        },delay);
        setTimeout(function(){
          el.querySelector(".f3i").classList.add("fl");
        },delay+flyDur-90);
        setTimeout(function(){
          el.style.zIndex="";
        },delay+flyDur);
      });
      stacks.forEach(function(st){
        setTimeout(function(){st.dataset.ready="1";},maxT+220);
        enableMagnify(st,ch,offset);
      });
      setTimeout(function(){document.getElementById("peekBtn").style.display="block";},maxT+220);
      setPips(round-1);
      setStatus("round",round);
      return;
    }

    var maxDelay=0;
    if(reduced){
      pcs.forEach(function(el){el.classList.add("in");});
      stacks.forEach(function(st){st.dataset.ready="1";enableMagnify(st,ch,offset);});
    }else{
      pcs.forEach(function(el){
        var o=parseInt(el.getAttribute("data-order"),10);
        var t1=42*o, t2=42*o+200;
        if(t2>maxDelay)maxDelay=t2;
        setTimeout(function(){el.classList.add("in");},t1);
        setTimeout(function(){el.querySelector(".f3i").classList.add("fl");},t2);
      });
      stacks.forEach(function(st){
        setTimeout(function(){st.dataset.ready="1";},maxDelay+560);
        enableMagnify(st,ch,offset);
      });
    }
    setPips(round-1);
    setStatus("round",round);
    document.getElementById("peekBtn").style.display="block";
  }

  window.peekCards=function(){
    if(phase!=="rounds"||peeking)return;
    peeking=true;
    document.getElementById("piles").style.display="none";
    document.getElementById("peekBtn").style.display="none";
    var fan=document.getElementById("fan");
    fan.style.display="block";
    renderFan();
    window.scrollTo({top:0,behavior:reduced?"auto":"smooth"});
  };

  window.backToPiles=function(){
    if(!peeking)return;
    peeking=false;
    document.getElementById("backBtn").style.display="none";
    document.getElementById("fan").style.display="none";
    document.getElementById("piles").style.display="grid";
    document.getElementById("peekBtn").style.display="block";
    var st=document.getElementById("stage");
    if(st)st.scrollIntoView({behavior:reduced?"auto":"smooth",block:"start"});
  };

  window.startRounds=function(){
    phase="rounds";
    var fan=document.getElementById("fan");
    var fanBtn=document.getElementById("fanBtn");
    fanBtn.style.display="none";
    if(reduced){
      fan.style.display="none";
      renderPiles();
      return;
    }
    var fr=fan.getBoundingClientRect();
    var deckX=fr.left+fr.width/2;
    var deckY=fr.top+Math.min(96,fr.height*0.3);
    var anchor={x:deckX,y:deckY};
    var fcs=[].slice.call(fan.querySelectorAll(".fc"));
    var gMax=0;
    fcs.forEach(function(el,i){
      var r=el.getBoundingClientRect();
      var cx=r.left+r.width/2, cy=r.top+r.height/2;
      var dx=deckX-cx, dy=deckY-cy+i*0.6;
      var d=i*15;
      if(d>gMax)gMax=d;
      var inner=el.querySelector(".f3i");
      setTimeout(function(){
        el.style.zIndex=String(50+i);
        el.style.transition="transform .5s cubic-bezier(.5,.05,.25,1)";
        el.style.transform="translate("+dx.toFixed(1)+"px,"+dy.toFixed(1)+"px) rotate("+((i%2?-1.5:1.5))+"deg)";
        if(inner)inner.classList.remove("fl");
      },d);
    });
    var gatherDone=gMax+500;
    setTimeout(function(){
      fan.style.display="none";
      fan.classList.remove("rows");
      renderPiles(anchor);
    },gatherDone+300);
  };

  window.pick=function(p){
    var wrap=document.getElementById("piles");
    if(wrap.classList.contains("out"))return;
    var doNext=function(){
      var piles=deal();
      cards=piles[(p+1)%3].concat(piles[p],piles[(p+2)%3]);
      round++;
      if(round>3){revealCard();}else{renderPiles();}
    };
    if(reduced){doNext();return;}
    wrap.classList.add("out");
    setTimeout(doNext,320);
  };

  function revealCard(){
    phase="reveal";
    peeking=false;
    document.getElementById("peekBtn").style.display="none";
    document.getElementById("backBtn").style.display="none";
    setPips(3);
    var c=cards[10];
    var fake=cards[3];
    if(fake.r===c.r&&fake.s===c.s)fake=cards[4];
    document.getElementById("piles").style.display="none";
    setStatus("hold");
    var rv=document.getElementById("reveal");
    rv.style.display="block";
    rv.innerHTML='<p class="think">'+t("readingMind")+'<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>';
    var t1=reduced?350:1800, t2=reduced?350:2000;
    setTimeout(function(){
      rv.innerHTML='<p class="think">'+t("isItThe")+'<span style="color:'
        +(isRed(fake.s)?"var(--red)":"var(--white)")+'">'+fake.r+' '+GLYPH[fake.s]+'</span>'+t("nope")+'</p>';
      setTimeout(function(){finalReveal(c);},t2);
    },t1);
  }

  function finalReveal(c){
    setStatus("got");
    document.getElementById("secret").style.display="";
    var rv=document.getElementById("reveal");
    rv.innerHTML=
      '<p class="think" style="margin:8px 0 20px;">'+t("yourCardIs")+'</p>'
      +'<div class="flipScene"><div class="flipInner" id="flip">'
      +'<div class="flipFace bigBack"></div>'
      +'<div class="flipFace flipFront">'+cardHTML(c,160,224,24)+'</div>'
      +'</div></div>'
      +'<p class="revealName" id="rvName">'+fullName(c)+'!</p>'
      +'<p class="revealSub" id="rvSub">'+t("revealSub")+'</p>'
      +'<div class="revealBtns">'
      +'<button class="btn" onclick="resetGame()">'+t("playAgain")+'</button>'
      +'</div>';
    setTimeout(function(){
      document.getElementById("flip").classList.add("flipped");
      document.getElementById("rvName").classList.add("show");
      document.getElementById("rvSub").classList.add("show");
      confetti();
    },reduced?40:550);
  }

  function confetti(){
    if(reduced)return;
    var colors=["#F4B63F","#E8473F","#3DBBB0","#FFFFFF","#F4A93F"];
    for(var i=0;i<60;i++){
      var d=document.createElement("span");
      d.className="cf";
      var sz=6+Math.random()*8;
      d.style.left=(Math.random()*100)+"vw";
      d.style.width=sz+"px";
      d.style.height=(sz*0.6)+"px";
      d.style.background=colors[Math.floor(Math.random()*colors.length)];
      d.style.animationDuration=(2.1+Math.random()*1.6)+"s";
      d.style.animationDelay=(Math.random()*0.5)+"s";
      document.body.appendChild(d);
      setTimeout(function(el){return function(){el.remove();};}(d),4500);
    }
  }

  function fullName(c){
    var d=I18N.en;
    var rk=d.names[c.r]||("The "+c.r);
    return d.nameFmt(rk,d.suits[c.s]);
  }

  window.resetGame=function(){
    cards=freshDeck();round=1;phase="fan";peeking=false;
    setPips(0);
    document.getElementById("reveal").style.display="none";
    document.getElementById("piles").style.display="none";
    document.getElementById("peekBtn").style.display="none";
    document.getElementById("backBtn").style.display="none";
    setStatus("fanMemorize");
    document.getElementById("fan").style.display="block";
    renderFan();
    window.scrollTo({top:0,behavior:reduced?"auto":"smooth"});
  };

  var resizeTimer,lastW=window.innerWidth;
  window.addEventListener("resize",function(){
    // Mobile scroll shows/hides the address bar, firing resize with only a
    // HEIGHT change. Ignore those so the deal/flip animations don't replay.
    if(window.innerWidth===lastW)return;
    lastW=window.innerWidth;
    clearTimeout(resizeTimer);
    resizeTimer=setTimeout(function(){
      if(peeking){renderFan();}
      else if(phase==="fan"){renderFan();}
      else if(phase==="rounds"){renderPiles();}
    },200);
  });

  document.getElementById("langEn").classList.toggle("on",lang==="en");
  document.getElementById("langMy").classList.toggle("on",lang==="my");
  document.documentElement.lang=(lang==="my"?"my":"en");
  applyStatic();
  renderStatus();
  cards=freshDeck();
  renderFan();
})();
</script>
</body>
</html>
